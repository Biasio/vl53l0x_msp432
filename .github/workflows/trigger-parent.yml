name: Notifica il parent dopo un push

on:
  push:
    branches: [ main, master ]

jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch event to parent
        env:
          PARENT_OWNER: "Biasio"
          PARENT_REPO: "EmbeddedHomeAccessControlSystem"
          TOKEN: ${{ secrets.EMBEDDED_PROJECT_PARENT_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$PARENT_OWNER/$PARENT_REPO/dispatches \
            -d '{"event_type":"child-updated"}'
